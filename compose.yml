services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: visp
      POSTGRES_PASSWORD: visp
      POSTGRES_USER: visp
    ports:
      - "54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visp -d visp"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: visp-local-secret
      MINIO_ROOT_USER: visp
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 visp visp-local-secret &&
      mc mb --ignore-existing local/visp-snapshots"

  mediamtx:
    build:
      context: .
      dockerfile: deploy/local/mediamtx.Dockerfile
    environment:
      APP_ORIGIN: http://host.docker.internal:3000
      HOOK_SECRET: ${HOOK_SECRET:-local-development-hook-secret-at-least-32-characters}
      MTX_APIADDRESS: :9997
      MTX_AUTHHTTPADDRESS: http://host.docker.internal:3000/api/mediamtx/auth
      MTX_RTSPADDRESS: :8554
      MTX_WEBRTCADDRESS: :8889
      MTX_WEBRTCADDITIONALHOSTS: 127.0.0.1
      MTX_WEBRTCALLOWORIGINS: https://visp.localhost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1935:1935"
      - "8189:8189/udp"
      - "8554:8554"
      - "8889:8889"
      - "8890:8890/udp"
      - "9997:9997"
    volumes:
      - ./deploy/relay/mediamtx.yml:/mediamtx.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9997/v3/config/global/get"]
      interval: 2s
      timeout: 3s
      retries: 30

  gateway:
    image: caddy:2-alpine
    depends_on:
      mediamtx:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:80"
    volumes:
      - ./deploy/local/Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--header=Host: relay.visp.localhost", "http://127.0.0.1/ping"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  minio-data:
  postgres-data:
