services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: visp_test
      POSTGRES_PASSWORD: visp
      POSTGRES_USER: visp
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visp -d visp_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
